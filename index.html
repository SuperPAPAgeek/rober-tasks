<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rober Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0f0f;--surface:#171717;--surface2:#1f1f1f;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --text:#f0f0f0;--muted:#555;--muted2:#888;
  --banakey:#ff6b35;--banakey-bg:rgba(255,107,53,0.12);
  --reel:#a78bfa;--reel-bg:rgba(167,139,250,0.12);
  --h3:#34d399;--h3-bg:rgba(52,211,153,0.12);
  --personal:#94a3b8;--personal-bg:rgba(148,163,184,0.12);
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.shell{display:grid;grid-template-columns:224px 1fr;min-height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{padding:32px 36px;max-width:900px}
.logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:16px}
.logo-title{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.logo-sub{font-size:11px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace}
.nav-block{padding:0 12px;margin-bottom:4px}
.nav-lbl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:0 8px;margin-bottom:4px;margin-top:12px;display:block}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r);cursor:pointer;color:var(--muted2);font-size:13px;font-weight:500;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface2);color:var(--text)}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nav-cnt{margin-left:auto;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);min-width:16px;text-align:right}
.nav-sub{padding-left:28px}
.nav-sub .nav-item{font-size:12px;padding:5px 10px;color:var(--muted)}
.nav-add{display:flex;align-items:center;gap:6px;padding:5px 10px;font-size:12px;color:var(--muted);cursor:pointer;border:none;background:none;width:100%;border-radius:var(--r);transition:all .15s}
.nav-add:hover{color:var(--text);background:var(--surface2)}

/* Capture */
.capture{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:28px}
.capture-row1{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.capture-row1 input{flex:1;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text)}
.capture-row1 input::placeholder{color:var(--muted)}
.capture-row2{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--muted2);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 8px;outline:none;cursor:pointer;transition:border-color .15s}
select:focus{border-color:var(--border2)}
.add-btn{background:var(--text);color:var(--bg);border:none;border-radius:6px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-left:auto}
.add-btn:hover{opacity:.85}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px}
.stat-n{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;line-height:1}
.stat-l{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}

/* Section */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.sec-action{background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:4px}
.sec-action:hover{color:var(--text);background:var(--surface2)}

/* Tasks */
.task-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.task-item{display:flex;align-items:center;gap:11px;padding:10px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);transition:border-color .15s}
.task-item:hover{border-color:var(--border2)}
.task-item.done{opacity:.32}
.task-item.done .task-title{text-decoration:line-through}
.chk{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:none}
.chk:hover{border-color:var(--muted2)}
.chk.on{background:var(--text);border-color:var(--text)}
.chk.on::after{content:'✓';font-size:10px;color:var(--bg)}
.task-title{flex:1;font-size:14px;line-height:1.4}
.task-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.sub-badge{font-size:11px;padding:2px 7px;border-radius:20px;border:1px solid var(--border2);color:var(--muted2)}
.day-tag{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 4px;border-radius:4px;opacity:0;transition:opacity .15s}
.task-item:hover .del{opacity:1}
.del:hover{color:var(--text)}

/* Week grid */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:28px}
.day-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:9px 7px;min-height:88px}
.day-col.today{border-color:rgba(255,255,255,0.22)}
.day-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:7px;text-align:center;text-transform:uppercase;letter-spacing:.05em}
.day-col.today .day-name{color:var(--text)}
.wk-task{font-size:10px;padding:3px 5px;border-radius:4px;margin-bottom:3px;line-height:1.3;word-break:break-word}

/* Filters */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pill{background:none;border:1px solid var(--border);border-radius:20px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:4px 12px;cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--border2);color:var(--text)}
.pill.on{background:var(--text);color:var(--bg);border-color:var(--text)}

/* Proj group */
.proj-group{margin-bottom:24px}
.proj-head{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.proj-dot-lg{width:10px;height:10px;border-radius:50%}
.proj-nm{font-size:13px;font-weight:600}
.proj-st{font-size:12px;color:var(--muted);margin-left:auto;font-family:'DM Mono',monospace}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:24px;width:340px;max-width:90vw}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
.modal input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;outline:none;margin-bottom:12px}
.modal input:focus{border-color:var(--border2)}
.modal select{width:100%;margin-bottom:16px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:7px 16px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:none;color:var(--muted2);transition:all .15s}
.modal-btns button.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.modal-btns button:hover{color:var(--text)}

.empty{font-size:13px;color:var(--muted);padding:20px 0;text-align:center;font-family:'DM Mono',monospace}
.done-sep{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 7px;font-family:'DM Mono',monospace}
.view{display:none}.view.active{display:block}
.loading{font-size:13px;color:var(--muted);padding:40px 0;text-align:center;font-family:'DM Mono',monospace}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:680px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;bottom:0;top:auto;height:auto;flex-direction:row;border-right:none;border-top:1px solid var(--border);padding:8px 4px;z-index:100;width:100%;overflow-x:auto;overflow-y:hidden}
  .logo,.nav-lbl,.nav-cnt,.nav-sub,.nav-add{display:none}
  .nav-block{padding:0;margin:0;display:flex;gap:2px;flex-shrink:0}
  .nav-item{flex-direction:column;gap:2px;font-size:9px;padding:5px 8px;min-width:52px;text-align:center;justify-content:center}
  .nav-dot{display:none}
  .main{padding:16px;padding-bottom:80px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .week-grid{grid-template-columns:repeat(4,1fr)}
  .capture-row2{gap:6px}
}
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main">
    <div class="capture">
      <div class="capture-row1">
        <input type="text" id="task-input" placeholder="Nueva tarea... (Enter para añadir)" onkeydown="if(event.key==='Enter')addTask()"/>
      </div>
      <div class="capture-row2">
        <select id="proj-sel" onchange="updateSubSel()">
          <option value="Banakey">Banakey</option>
          <option value="ReelHungry">ReelHungry</option>
          <option value="H3.0">H3.0</option>
          <option value="Personal">Personal</option>
        </select>
        <select id="sub-sel" style="display:none"></select>
        <select id="day-sel">
          <option value="hoy">Hoy</option>
          <option value="L">Lunes</option>
          <option value="M">Martes</option>
          <option value="X">Miércoles</option>
          <option value="J">Jueves</option>
          <option value="V">Viernes</option>
          <option value="backlog">Backlog</option>
        </select>
        <button class="add-btn" onclick="addTask()">+ Añadir</button>
      </div>
    </div>

    <div id="view-hoy" class="view active"></div>
    <div id="view-semana" class="view"></div>
    <div id="view-banakey" class="view"></div>
    <div id="view-reelhungry" class="view"></div>
    <div id="view-h3" class="view"></div>
    <div id="view-personal" class="view"></div>
    <div id="view-backlog" class="view"></div>
  </main>
</div>

<!-- Modal subproyecto -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Nuevo sub-proyecto</h3>
    <input type="text" id="modal-name" placeholder="Nombre del cliente / restaurante..."/>
    <select id="modal-proj">
      <option value="Banakey">Banakey</option>
      <option value="ReelHungry">ReelHungry</option>
    </select>
    <div class="modal-btns">
      <button onclick="closeModal()">Cancelar</button>
      <button class="primary" onclick="createSubproject()">Crear</button>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://taydipkkieiuinmcayks.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRheWRpcGtraWVpdWlubWNheWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzODg1NzEsImV4cCI6MjA5NTk2NDU3MX0.hrWg1H3N_M023BBSm6lm7Sq8m9_JrNMKa8VxcxTOaBs';

const PROJ = {
  Banakey:    {color:'var(--banakey)',    bg:'var(--banakey-bg)',    key:'banakey'},
  ReelHungry: {color:'var(--reel)',       bg:'var(--reel-bg)',       key:'reelhungry'},
  'H3.0':     {color:'var(--h3)',         bg:'var(--h3-bg)',         key:'h3'},
  Personal:   {color:'var(--personal)',   bg:'var(--personal-bg)',   key:'personal'}
};
const DAY_LBL = {hoy:'Hoy',L:'Lun',M:'Mar',X:'Mié',J:'Jue',V:'Vie',S:'Sáb',D:'Dom',backlog:'Backlog'};

let tasks = [];
let subprojects = [];
let activeView = 'hoy';
let blFilter = 'all';

async function api(method, table, body, params=''){
  const url = `${SUPA_URL}/rest/v1/${table}${params}`;
  const opts = {
    method,
    headers:{
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${SUPA_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'return=representation' : 'return=minimal'
    }
  };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if(r.status === 204 || r.status === 200 && method !== 'GET' && !r.headers.get('content-length')) return null;
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}

async function loadAll(){
  [tasks, subprojects] = await Promise.all([
    api('GET','tasks','','?order=created_at.desc'),
    api('GET','subprojects','','?order=name.asc')
  ]);
  tasks = tasks || [];
  subprojects = subprojects || [];
  renderSidebar();
  render();
}

async function addTask(){
  const inp = document.getElementById('task-input');
  const title = inp.value.trim();
  if(!title) return;
  const proj = document.getElementById('proj-sel').value;
  const subSel = document.getElementById('sub-sel');
  const subproject_id = subSel.style.display!=='none' && subSel.value ? subSel.value : null;
  const day = document.getElementById('day-sel').value;
  inp.value='';
  const res = await api('POST','tasks',{title,project:proj,subproject_id,day,done:false});
  if(res && res[0]) tasks.unshift(res[0]);
  renderSidebar();
  render();
}

async function toggleDone(id){
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  t.done = !t.done;
  render();
  await api('PATCH','tasks',{done:t.done},`?id=eq.${id}`);
  renderSidebar();
}

async function deleteTask(id){
  tasks = tasks.filter(x=>x.id!==id);
  render();
  await api('DELETE','tasks','',`?id=eq.${id}`);
  renderSidebar();
}

async function clearDone(){
  const ids = tasks.filter(t=>t.done && t.day==='hoy').map(t=>t.id);
  if(!ids.length) return;
  tasks = tasks.filter(t=>!(t.done && t.day==='hoy'));
  render();
  for(const id of ids) await api('DELETE','tasks','',`?id=eq.${id}`);
  renderSidebar();
}

async function createSubproject(){
  const name = document.getElementById('modal-name').value.trim();
  const project = document.getElementById('modal-proj').value;
  if(!name) return;
  const res = await api('POST','subprojects',{name,project});
  if(res && res[0]) subprojects.push(res[0]);
  subprojects.sort((a,b)=>a.name.localeCompare(b.name));
  closeModal();
  renderSidebar();
  updateSubSel();
  render();
}

function openModal(proj='Banakey'){
  document.getElementById('modal-name').value='';
  document.getElementById('modal-proj').value=proj;
  document.getElementById('modal-bg').classList.add('show');
  setTimeout(()=>document.getElementById('modal-name').focus(),100);
}
function closeModal(){ document.getElementById('modal-bg').classList.remove('show'); }
document.getElementById('modal-bg').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });

function updateSubSel(){
  const proj = document.getElementById('proj-sel').value;
  const subSel = document.getElementById('sub-sel');
  if(proj==='Banakey'||proj==='ReelHungry'){
    const subs = subprojects.filter(s=>s.project===proj);
    subSel.innerHTML = `<option value="">Sin sub-proyecto</option>` + subs.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
    subSel.style.display='';
  } else {
    subSel.style.display='none';
  }
}

function subName(id){ const s=subprojects.find(x=>x.id===id); return s?s.name:null; }

function badge(proj){
  const p=PROJ[proj];
  return `<span class="badge" style="background:${p.bg};color:${p.color}">${proj}</span>`;
}

function taskEl(t, showProj=true, showDay=false){
  const sn = t.subproject_id ? subName(t.subproject_id) : null;
  return `<div class="task-item ${t.done?'done':''}">
    <div class="chk ${t.done?'on':''}" onclick="toggleDone('${t.id}')"></div>
    <span class="task-title">${t.title}</span>
    <div class="task-right">
      ${showDay&&t.day?`<span class="day-tag">${DAY_LBL[t.day]||t.day}</span>`:''}
      ${sn?`<span class="sub-badge">${sn}</span>`:''}
      ${showProj?badge(t.project):''}
      <button class="del" onclick="deleteTask('${t.id}')">✕</button>
    </div>
  </div>`;
}

function counts(){
  const c={};
  c.hoy = tasks.filter(t=>t.day==='hoy'&&!t.done).length;
  c.semana = tasks.filter(t=>['hoy','L','M','X','J','V'].includes(t.day)&&!t.done).length;
  c.banakey = tasks.filter(t=>t.project==='Banakey'&&!t.done).length;
  c.reelhungry = tasks.filter(t=>t.project==='ReelHungry'&&!t.done).length;
  c.h3 = tasks.filter(t=>t.project==='H3.0'&&!t.done).length;
  c.personal = tasks.filter(t=>t.project==='Personal'&&!t.done).length;
  c.backlog = tasks.filter(t=>t.day==='backlog'&&!t.done).length;
  return c;
}

function renderSidebar(){
  const c = counts();
  const subs_b = subprojects.filter(s=>s.project==='Banakey');
  const subs_r = subprojects.filter(s=>s.project==='ReelHungry');

  const navItem = (id,icon,label,cnt,extra='') =>
    `<button class="nav-item ${activeView===id?'active':''}" onclick="switchView('${id}')" id="nav-${id}">
      ${icon}<span style="flex:1">${label}</span><span class="nav-cnt">${cnt||''}</span>
    </button>${extra}`;

  const subItems = (subs, proj) => subs.map(s => {
    const cnt = tasks.filter(t=>t.subproject_id===s.id&&!t.done).length;
    const vid = 'sub_'+s.id;
    return `<div class="nav-sub"><button class="nav-item ${activeView===vid?'active':''}" onclick="switchView('${vid}')">
      <span style="flex:1;font-size:12px">${s.name}</span><span class="nav-cnt">${cnt||''}</span>
    </button></div>`;
  }).join('') + `<div class="nav-sub"><button class="nav-add" onclick="openModal('${proj}')">+ sub-proyecto</button></div>`;

  document.getElementById('sidebar').innerHTML = `
    <div class="logo"><div class="logo-title">rober/tasks</div><div class="logo-sub">sistema de mando</div></div>
    <div class="nav-block">
      <span class="nav-lbl">Vistas</span>
      ${navItem('hoy','◈ ','Hoy',c.hoy)}
      ${navItem('semana','⊞ ','Semana',c.semana)}
    </div>
    <div class="nav-block">
      <span class="nav-lbl">Proyectos</span>
      ${navItem('banakey',`<span class="nav-dot" style="background:var(--banakey)"></span>`,'Banakey',c.banakey)}
      ${subItems(subs_b,'Banakey')}
      ${navItem('reelhungry',`<span class="nav-dot" style="background:var(--reel)"></span>`,'ReelHungry',c.reelhungry)}
      ${subItems(subs_r,'ReelHungry')}
      ${navItem('h3',`<span class="nav-dot" style="background:var(--h3)"></span>`,'H3.0',c.h3)}
      ${navItem('personal',`<span class="nav-dot" style="background:var(--personal)"></span>`,'Personal',c.personal)}
    </div>
    <div class="nav-block">
      <span class="nav-lbl">Más</span>
      ${navItem('backlog','≡ ','Backlog',c.backlog)}
    </div>`;
}

function renderHoy(){
  const today = tasks.filter(t=>t.day==='hoy');
  const pending = today.filter(t=>!t.done);
  const done = today.filter(t=>t.done);
  const pct = today.length ? Math.round(done.length/today.length*100) : 0;
  const bl = tasks.filter(t=>t.day==='backlog'&&!t.done).length;
  document.getElementById('view-hoy').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-n">${pending.length}</div><div class="stat-l">Pendientes</div></div>
      <div class="stat"><div class="stat-n">${done.length}</div><div class="stat-l">Hechas</div></div>
      <div class="stat"><div class="stat-n">${pct}%</div><div class="stat-l">Progreso</div></div>
      <div class="stat"><div class="stat-n">${bl}</div><div class="stat-l">Backlog</div></div>
    </div>
    <div class="sec-head"><span class="sec-title">Pendientes</span><button class="sec-action" onclick="clearDone()">Limpiar completadas</button></div>
    <div class="task-list">${pending.length ? pending.map(t=>taskEl(t)).join('') : '<div class="empty">sin tareas hoy</div>'}</div>
    ${done.length ? `<div class="done-sep">Completadas</div><div class="task-list">${done.map(t=>taskEl(t)).join('')}</div>` : ''}`;
}

function renderSemana(){
  const semDays = ['hoy','L','M','X','J','V'];
  let grid = semDays.map(d=>{
    const ts = tasks.filter(t=>t.day===d&&!t.done);
    return `<div class="day-col ${d==='hoy'?'today':''}">
      <div class="day-name">${d==='hoy'?'HOY':d}</div>
      ${ts.map(t=>{const p=PROJ[t.project];return `<div class="wk-task" style="background:${p.bg};color:${p.color}">${t.title}</div>`;}).join('')}
    </div>`;
  }).join('') + ['S','D'].map(d=>`<div class="day-col"><div class="day-name">${d}</div></div>`).join('');
  const all = tasks.filter(t=>semDays.includes(t.day)&&!t.done);
  document.getElementById('view-semana').innerHTML = `
    <div class="week-grid">${grid}</div>
    <div class="sec-head"><span class="sec-title">Todas esta semana</span></div>
    <div class="task-list">${all.length ? all.map(t=>taskEl(t,true,true)).join('') : '<div class="empty">semana despejada</div>'}</div>`;
}

function renderProjView(projName, viewId){
  const p = PROJ[projName];
  const hasSubs = projName==='Banakey'||projName==='ReelHungry';
  const active = tasks.filter(t=>t.project===projName&&!t.done);
  const done = tasks.filter(t=>t.project===projName&&t.done);
  const pct = (active.length+done.length) ? Math.round(done.length/(active.length+done.length)*100) : 0;

  let html = `
    <div class="proj-head" style="margin-bottom:20px">
      <div class="proj-dot-lg" style="background:${p.color};width:13px;height:13px;border-radius:50%"></div>
      <span class="proj-nm">${projName}</span>
      <span class="proj-st">${active.length} activas · ${pct}% completado</span>
      ${hasSubs?`<button class="sec-action" style="margin-left:8px" onclick="openModal('${projName}')">+ sub-proyecto</button>`:''}
    </div>
    <div class="stats" style="margin-bottom:24px">
      <div class="stat"><div class="stat-n">${active.filter(t=>t.day==='hoy').length}</div><div class="stat-l">Hoy</div></div>
      <div class="stat"><div class="stat-n">${active.filter(t=>['L','M','X','J','V'].includes(t.day)).length}</div><div class="stat-l">Esta semana</div></div>
      <div class="stat"><div class="stat-n">${active.filter(t=>t.day==='backlog').length}</div><div class="stat-l">Backlog</div></div>
      <div class="stat"><div class="stat-n">${done.length}</div><div class="stat-l">Completadas</div></div>
    </div>`;

  if(hasSubs){
    const subs = subprojects.filter(s=>s.project===projName);
    const sinSub = active.filter(t=>!t.subproject_id);
    subs.forEach(s=>{
      const sts = active.filter(t=>t.subproject_id===s.id);
      if(!sts.length) return;
      html += `<div class="proj-group">
        <div class="proj-head"><span class="proj-nm" style="font-size:13px">${s.name}</span><span class="proj-st">${sts.length}</span></div>
        <div class="task-list">${sts.map(t=>taskEl(t,false,true)).join('')}</div>
      </div>`;
    });
    if(sinSub.length){
      html += `<div class="proj-group">
        <div class="proj-head"><span class="proj-nm" style="font-size:13px;color:var(--muted2)">Sin sub-proyecto</span><span class="proj-st">${sinSub.length}</span></div>
        <div class="task-list">${sinSub.map(t=>taskEl(t,false,true)).join('')}</div>
      </div>`;
    }
    if(!active.length) html += '<div class="empty">sin tareas activas</div>';
  } else {
    html += `<div class="sec-head"><span class="sec-title">Activas</span></div>
      <div class="task-list">${active.length ? active.map(t=>taskEl(t,false,true)).join('') : '<div class="empty">sin tareas activas</div>'}</div>`;
  }
  if(done.length) html += `<div class="done-sep">Completadas</div><div class="task-list">${done.map(t=>taskEl(t,false,true)).join('')}</div>`;
  document.getElementById('view-'+viewId).innerHTML = html;
}

function renderSubView(sub){
  const vid = 'sub_'+sub.id;
  let el = document.getElementById('view-'+vid);
  if(!el){
    el = document.createElement('div');
    el.id = 'view-'+vid;
    el.className = 'view';
    document.querySelector('.main').appendChild(el);
  }
  const active = tasks.filter(t=>t.subproject_id===sub.id&&!t.done);
  const done = tasks.filter(t=>t.subproject_id===sub.id&&t.done);
  const p = PROJ[sub.project];
  el.innerHTML = `
    <div class="proj-head" style="margin-bottom:20px">
      <div class="proj-dot-lg" style="background:${p.color};width:13px;height:13px;border-radius:50%"></div>
      <span class="proj-nm">${sub.name}</span>
      <span class="proj-st" style="font-size:12px;color:var(--muted)">${sub.project}</span>
      <span class="proj-st">${active.length} activas</span>
    </div>
    <div class="sec-head"><span class="sec-title">Activas</span></div>
    <div class="task-list">${active.length ? active.map(t=>taskEl(t,false,true)).join('') : '<div class="empty">sin tareas</div>'}</div>
    ${done.length?`<div class="done-sep">Completadas</div><div class="task-list">${done.map(t=>taskEl(t,false,true)).join('')}</div>`:''}`;
}

function renderBacklog(){
  const projs = Object.keys(PROJ);
  document.getElementById('view-backlog').innerHTML = `
    <div class="filters">${
      `<button class="pill ${blFilter==='all'?'on':''}" onclick="setBlFilter('all')">Todos</button>`
      + projs.map(p=>`<button class="pill ${blFilter===p?'on':''}" onclick="setBlFilter('${p}')">${p}</button>`).join('')
    }</div>
    <div id="bl-content"></div>`;
  renderBlContent();
}

function renderBlContent(){
  const show = blFilter==='all' ? Object.keys(PROJ) : [blFilter];
  let html='';
  show.forEach(p=>{
    const pc=PROJ[p];
    const ts = tasks.filter(t=>t.project===p&&t.day==='backlog'&&!t.done);
    if(!ts.length) return;
    html+=`<div class="proj-group">
      <div class="proj-head">
        <div class="proj-dot-lg" style="background:${pc.color}"></div>
        <span class="proj-nm" style="font-size:13px">${p}</span>
        <span class="proj-st">${ts.length}</span>
      </div>
      <div class="task-list">${ts.map(t=>taskEl(t,false,true)).join('')}</div>
    </div>`;
  });
  const el = document.getElementById('bl-content');
  if(el) el.innerHTML = html || '<div class="empty">backlog vacío</div>';
}

function setBlFilter(f){ blFilter=f; renderBacklog(); }

function render(){
  if(activeView==='hoy') renderHoy();
  else if(activeView==='semana') renderSemana();
  else if(activeView==='backlog') renderBacklog();
  else if(activeView==='banakey') renderProjView('Banakey','banakey');
  else if(activeView==='reelhungry') renderProjView('ReelHungry','reelhungry');
  else if(activeView==='h3') renderProjView('H3.0','h3');
  else if(activeView==='personal') renderProjView('Personal','personal');
  else if(activeView.startsWith('sub_')){
    const id = activeView.replace('sub_','');
    const sub = subprojects.find(s=>s.id===id);
    if(sub) renderSubView(sub);
  }
}

function switchView(v){
  activeView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('view-'+v);
  if(el) el.classList.add('active');
  renderSidebar();
  render();
}

// Init
document.getElementById('view-hoy').innerHTML='<div class="loading"><span class="spinner"></span>cargando...</div>';
loadAll().then(updateSubSel);
</script>
</body>
</html>
